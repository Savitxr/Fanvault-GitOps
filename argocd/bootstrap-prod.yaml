apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fanvault-bootstrap-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Fanvault-CloudOps/Fanvault-GitOps.git
    targetRevision: HEAD
    path: argocd/apps-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
