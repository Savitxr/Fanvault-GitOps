apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Fanvault-CloudOps/Fanvault-GitOps.git
    targetRevision: HEAD
    path: charts/frontend
    helm:
      valueFiles:
        - values.yaml
        - ../../environments/prod/values-frontend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
